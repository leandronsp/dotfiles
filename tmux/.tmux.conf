# Mouse and vi mode
set -g mouse on
setw -g mode-keys vi
set-window-option -g mode-keys vi
set -g history-limit 100000

# Prefix
bind-key b send-prefix
set -g prefix C-b
unbind-key C-h
bind-key C-b send-prefix

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Status bar
set -g status-left '[#S] '
set -g status-right ''
set -g pane-border-status off
set -g pane-border-format "#{pane_index} #{pane_current_command}"

# Open new panes/windows in current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Reset window highlight when entering (used by Claude notify hook)
set-hook -g after-select-window 'set-window-option window-status-style default'

# Yellow theme
set -g pane-active-border-style fg=yellow
set -g status-bg yellow
set -g status-fg black
set-window-option -g window-status-current-style bg=black,fg=yellow

# Copy mode (macOS pbcopy)
set-option -g default-command "which reattach-to-user-namespace > /dev/null && reattach-to-user-namespace -l $SHELL || $SHELL"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "reattach-to-user-namespace pbcopy"

# Claude annotate: select text in copy mode, press 'a' to annotate, prefix+S to send
bind-key -T copy-mode-vi a send-keys -X copy-pipe-no-clear "cat > /tmp/.claude-sel" \; display-popup -E -w 50% -h 30% -x R -y 1 -T " comment (:wq submit, :q! cancel)" ~/.local/bin/claude-comment
bind-key S if-shell "~/.local/bin/claude-send" "paste-buffer \; display-message 'Sent. Buffer cleared.'" "display-message 'Buffer empty.'"
bind-key B display-popup -E -w 80 -h 20 -T " claude buffer (q to close) " "less /tmp/claude-buf.md 2>/dev/null || echo '(empty)'"
bind-key C-x confirm-before -p "Clear annotation buffer? (y/n)" "run-shell '> /tmp/claude-buf.md && tmux display-message \"Buffer cleared.\"'"
