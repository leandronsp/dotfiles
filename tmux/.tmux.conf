# Ghostty/Kitty graphics protocol support.
# allow-passthrough lets image escape sequences reach the outer terminal.
# update-environment propagates Ghostty env vars on reattach.
set -g allow-passthrough on
set -ga update-environment "GHOSTTY_RESOURCES_DIR TERM_PROGRAM"

# Mouse and vi mode
set -g mouse on
setw -g mode-keys vi
set-window-option -g mode-keys vi
set -g history-limit 100000

# Prefix
bind-key b send-prefix
set -g prefix C-b
unbind-key C-h
bind-key C-b send-prefix

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Open new panes/windows in current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Reset highlights when entering (used by Claude notify hook)
set-hook -g after-select-window 'set-window-option window-status-format " #I #W "'
set-hook -g client-session-changed 'set-option status-left "#[fg=#DBBC7F,bg=#343F44] #S #[bg=#2D353B] "'

# Theme
set -g status-position bottom
set -g status-style "bg=#2D353B,fg=#859289"
set -g status-left "#[fg=#DBBC7F,bg=#343F44] #S #[bg=#2D353B] "
set -g status-right ""
set -g status-left-length 20
set -g status-justify left
set -g window-status-style "fg=#859289,bg=#343F44"
set -g window-status-last-style "fg=#859289,bg=#343F44"
set -g window-status-separator "#[fg=#3D484D,bg=#2D353B] · "
set -g window-status-format " #I #W "
set -g window-status-current-format "#[fg=#2D353B,bg=#DBBC7F] #I #W#{?window_zoomed_flag, Z,} "
set -g message-style "bg=#3D484D,fg=#D3C6AA"
set -g pane-border-style "fg=#3D484D"
set -g pane-active-border-style "fg=#3D484D"

# Copy mode (macOS pbcopy)
set-option -g default-command "which reattach-to-user-namespace > /dev/null && reattach-to-user-namespace -l $SHELL || $SHELL"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "reattach-to-user-namespace pbcopy"

# Annotation buffer: 'a' in copy mode to annotate, prefix+B to open, prefix+S to paste
bind-key -T copy-mode-vi a send-keys -X copy-pipe-no-clear "cat > /tmp/.abuf-sel" \; display-popup -E -w 50% -h 50% -x R -y 1 -T " annotation buffer (:wq save, :q close) " ~/.local/bin/abuf-edit
bind-key B display-popup -E -w 50% -h 50% -x R -y 1 -T " annotation buffer (:wq save, :q close) " ~/.local/bin/abuf-edit
bind-key S run-shell "~/.local/bin/abuf-paste '#{pane_id}'"
bind-key C-x confirm-before -p "Clear annotation buffer? (y/n)" "run-shell ~/.local/bin/abuf-clear"
